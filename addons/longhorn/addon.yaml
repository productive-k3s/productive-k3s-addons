apiVersion: addons.productive-k3s.io/v1
kind: Addon
metadata:
  name: longhorn
  version: 0.1.0
  category: platform
spec:
  type: helm
  impact:
    cluster: true
    host: true
    summary: "Installs Longhorn and prepares the host with iSCSI packages, service enablement, and the data path."
    hostCapabilities:
      - package-install
      - service-enable
      - filesystem-path
  configure:
    script: scripts/configure.sh
  install:
    script: scripts/install.sh
  validate:
    script: scripts/validate.sh
  clean:
    script: scripts/clean.sh
  backup:
    script: scripts/backup.sh
