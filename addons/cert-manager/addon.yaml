apiVersion: addons.productive-k3s.io/v1
kind: Addon
metadata:
  name: cert-manager
  version: 0.1.0
  category: platform
spec:
  type: shell
  impact:
    cluster: true
    host: false
    summary: "Installs cert-manager and manages ClusterIssuer resources for TLS-enabled add-ons."
  configure:
    script: scripts/configure.sh
  install:
    script: scripts/install.sh
  validate:
    script: scripts/validate.sh
  clean:
    script: scripts/clean.sh
  backup:
    script: scripts/backup.sh
