apiVersion: addons.productive-k3s.io/v1
kind: Addon
metadata:
  name: rancher
  version: 0.1.0
  category: platform
spec:
  type: helm
  impact:
    cluster: true
    host: true
    summary: "Installs Rancher and can optionally configure a local /etc/hosts entry for the selected hostname."
    hostCapabilities:
      - etc-hosts
  configure:
    script: scripts/configure.sh
  install:
    script: scripts/install.sh
  validate:
    script: scripts/validate.sh
  clean:
    script: scripts/clean.sh
  backup:
    script: scripts/backup.sh
